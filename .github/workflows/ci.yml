name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest
          python -m pip install -e .

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Build project package
        run: |
          if [ ! -f pyproject.toml ] && [ ! -f setup.py ] && [ ! -f setup.cfg ]; then
            echo "No Python packaging configuration found. Add pyproject.toml, setup.py, or setup.cfg to build the package." >&2
            exit 1
          fi

          python -m build

      - name: Run tests
        run: |
          if [ -d tests ] && find tests -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            pytest tests
          else
            echo "no tests exist."
          fi
